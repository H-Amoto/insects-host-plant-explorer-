name: Optimize Images

on:
  push:
    paths:
      - 'images/originals/**'
      - '!images/originals/.gitkeep'
  pull_request:
    paths:
      - 'images/originals/**'
      - '!images/originals/.gitkeep'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-optimization of all images'
        required: false
        default: 'false'

jobs:
  optimize:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          npm install sharp --save-dev
      
      - name: Get changed images
        id: changed-files
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.force != 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Checking PR changes..."
            git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD | grep -E '^images/originals/.*\.(jpg|jpeg|png|gif)$' > changed_images.txt || true
          else
            echo "Checking push changes..."
            git diff --name-only --diff-filter=AM HEAD~1...HEAD | grep -E '^images/originals/.*\.(jpg|jpeg|png|gif)$' > changed_images.txt || true
          fi
          
          if [ -s changed_images.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed images:"
            cat changed_images.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No image changes detected"
          fi
      
      - name: Optimize all images (force mode)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true'
        run: |
          echo "Force optimization of all images..."
          node scripts/optimize-images.mjs
      
      - name: Optimize changed images
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          echo "Optimizing changed images..."
          while IFS= read -r image; do
            echo "Processing: $image"
            node scripts/optimize-images.mjs "$image"
          done < changed_images.txt
      
      - name: Check for changes
        id: verify-changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_output=false" >> $GITHUB_OUTPUT
            echo "No new optimized images generated"
          else
            echo "has_output=true" >> $GITHUB_OUTPUT
            echo "New optimized images generated"
            git status --short
          fi
      
      - name: Create Pull Request
        if: steps.verify-changes.outputs.has_output == 'true' && github.event_name == 'push'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat: optimize images automatically'
          title: '🖼️ Automated Image Optimization'
          body: |
            ## Automated Image Optimization
            
            This PR contains automatically optimized images based on recent changes to the `images/originals/` directory.
            
            ### What was done:
            - Generated WebP versions (quality: 82)
            - Generated AVIF versions (quality: 60)
            - Created public copies for large originals (>2MB)
            
            ### Files changed:
            See the file changes below for details.
            
            ---
            *This PR was automatically generated by the image optimization workflow.*
          branch: auto/optimize-images-${{ github.run_number }}
          delete-branch: true
          labels: |
            automated
            optimization
            images
      
      - name: Commit changes directly (PR context)
        if: steps.verify-changes.outputs.has_output == 'true' && github.event_name == 'pull_request'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "feat: optimize images for PR #${{ github.event.pull_request.number }}"
          git push
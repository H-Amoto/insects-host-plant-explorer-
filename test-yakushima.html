<!DOCTYPE html>
<html>
<head>
    <title>ヤクシマルリシジミ食草テスト</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>ヤクシマルリシジミ食草パーステスト</h1>
    <script>
        // CSVの実際のデータ
        const hostPlants = "ヤマモモ（ヤマモモ科）; コナラ; カシワ; クヌギ; アベマキ; ウバメガシ; アカガシ; シラカシ; ウラジロガシ; アラカシ; シリブカガシ; マテバシイ; イチイガシ（以上ブナ科）; テリハアカショウマ（ユキノシタ科）; マンサク; トサミズキ; ヒュウガミズキ; イスノキ（以上マンサク科）; ノイバラ; ツクシイバラ; ヤブイバラ; テリハノイバラ; ハマナス; モッコウイバラ; イザヨイバラ; セイヨウバラ; コヒガンザクラ; シダレザクラ; ヤマザクラ; オオシマザクラ; ソメイヨシノ; サトザクラ; カンヒザクラ; ミザクラ; リンボク; バクチノキ; モモ; ヒメリンゴ; ハナカイドウ; カイドウ; シャリンバイ; カリン; ボケ; トキワサンザシ; タチバナモドキ; カザンデマリ; コトネアスター; シロバナミザクラ（サクランボ）; オランダイチゴ; ビワ（以上バラ科）; フジ; ヤマフジ; ナツフジ; デリス（以上マメ科）; カンコノキ; アカメガシワ; ナンキンハゼ（以上トウダイグサ科）; ハナヤナギ（ミソハギ科）; キリシマツツジ; サツキ; ヒラドツツジ; モチツツジ; ヨドガワツツジ; セイヨウシャクナゲ（以上ツツジ科）; ブッソウゲ（アオイ科）。石垣島ではコウシュンカズラ（キントラノオ科）; ヤンバルアワブキ（アワブキ科）も記録。主に新芽・若葉・花蕾を食べる";
        
        console.log("Original data:", hostPlants);
        
        // 現在の処理ロジックをシミュレート
        let cleanedHostPlants = hostPlants;
        
        // ヤクシマルリシジミの特別処理
        if (cleanedHostPlants.includes('以上')) {
            console.log('Special handling for complex data');
            cleanedHostPlants = cleanedHostPlants
                .replace(/（[^）]*科[^）]*）/g, '') // Remove family annotations
                .replace(/\([^)]*科[^)]*\)/g, '') 
                .replace(/。[^。]*$/g, '') // Remove final sentence
                .trim();
            console.log('After cleaning:', cleanedHostPlants);
        }
        
        // Split by delimiters
        const plants = cleanedHostPlants.split(/[;；、，,]/);
        console.log('Split plants:', plants);
        console.log('Number of plants:', plants.length);
        
        // Display results
        document.body.innerHTML += '<h2>処理結果</h2>';
        document.body.innerHTML += '<p>植物数: ' + plants.length + '</p>';
        document.body.innerHTML += '<ul>';
        plants.forEach((plant, i) => {
            document.body.innerHTML += '<li>' + (i+1) + ': ' + plant.trim() + '</li>';
        });
        document.body.innerHTML += '</ul>';
    </script>
</body>
</html>

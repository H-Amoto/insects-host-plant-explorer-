<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Display Count</title>
</head>
<body>
    <h1>昆虫表示数テスト</h1>
    <div id="result"></div>
    
    <script>
        // Test the actual display logic
        async function testDisplay() {
            const response = await fetch('https://h-amoto.github.io/insects-host-plant-explorer/');
            const html = await response.text();
            
            // Extract the count from the HTML
            const match = html.match(/昆虫 \((\d+)\)/);
            if (match) {
                document.getElementById('result').innerHTML = `
                    <p>現在の表示数: ${match[1]}種</p>
                    <p>期待される数: 7391種</p>
                    <p>差: ${7391 - parseInt(match[1])}種</p>
                `;
            } else {
                document.getElementById('result').innerHTML = 'カウントが見つかりませんでした';
            }
        }
        
        testDisplay();
    </script>
</body>
</html>

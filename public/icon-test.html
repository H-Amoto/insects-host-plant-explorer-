<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アイコンテストページ</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #333;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .icon-box {
            text-align: center;
            padding: 1.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fafafa;
        }
        .icon-box svg {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            stroke: #333;
            stroke-width: 2;
        }
        .icon-box h3 {
            margin: 0.5rem 0;
            color: #666;
            font-size: 1rem;
        }
        .current-icon {
            background: #e3f2fd;
            border-color: #2196f3;
        }
        .current-icon svg {
            stroke: #2196f3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>アイコンテストページ</h1>
        
        <h2>現在のアイコン</h2>
        <div class="icon-grid">
            <div class="icon-box current-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <g stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 8v8" />
                        <path d="M10 8c0-1.5-1-2-1-2M14 8c0-1.5 1-2 1-2" />
                        <path d="M12 10c-2 0-4-2-4-4s2-2 3-1c0.5 0.5 1 1 1 1s0.5-0.5 1-1c1-1 3-1 3 1s-2 4-4 4z" />
                        <path d="M12 14c-1.5 0-3 1.5-3 3s1.5 2 2.5 1c0.5-0.5 0.5-1 0.5-1s0 0.5 0.5 1c1 1 2.5 1 2.5-1s-1.5-3-3-3z" />
                    </g>
                </svg>
                <h3>現在の昆虫アイコン</h3>
            </div>
            <div class="icon-box current-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <g stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3c-4 0-7 3-7 7 0 2 0.5 3.5 1.5 4.5 1 1 2.5 1.5 4.5 1.5 0 2 0 4 0 6M12 3c4 0 7 3 7 7 0 2-0.5 3.5-1.5 4.5-1 1-2.5 1.5-4.5 1.5" />
                        <path d="M12 3v13" />
                        <path d="M9 7l3 3M15 7l-3 3M9 11l3 3M15 11l-3 3" />
                    </g>
                </svg>
                <h3>現在の食草アイコン</h3>
            </div>
        </div>

        <h2>昆虫アイコンの候補</h2>
        <div class="icon-grid">
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 9V15M10 7L12 9L14 7M8 12L12 8L16 12L12 16L8 12Z"/>
                </svg>
                <h3>1. 幾何学的な蝶</h3>
            </div>
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 4V20M8 8H16V16H8V8ZM10 4L8 6M14 4L16 6"/>
                </svg>
                <h3>2. シンプルな甲虫</h3>
            </div>
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 8V16M8 10H16M6 12H18M8 10V12L6 12V10L8 10ZM16 10V12L18 12V10L16 10Z"/>
                </svg>
                <h3>3. 角ばったトンボ</h3>
            </div>
        </div>

        <h2>食草アイコンの候補</h2>
        <div class="icon-grid">
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2L4 10V14L12 22L20 14V10L12 2ZM12 2V22M8 6L12 10L16 6M8 14L12 18L16 14"/>
                </svg>
                <h3>1. 幾何学的な葉</h3>
            </div>
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 22V10M12 10L8 6H12L16 10M12 14L8 18M12 14L16 18"/>
                </svg>
                <h3>2. シンプルな植物</h3>
            </div>
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 22V14M12 14L8 10L12 6L16 10L12 14ZM8 14L4 18H8M16 14L20 18H16"/>
                </svg>
                <h3>3. 角ばった木</h3>
            </div>
        </div>

        <h2>追加の候補</h2>
        <div class="icon-grid">
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 6L8 10V14L12 18L16 14V10L12 6ZM12 6V18M10 4L12 6M14 4L12 6"/>
                </svg>
                <h3>4. ダイヤ型昆虫</h3>
            </div>
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M4 12H20M12 4V20M8 8L16 8L16 16L8 16L8 8Z"/>
                </svg>
                <h3>5. グリッド昆虫</h3>
            </div>
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 20V8M8 12H16L12 4L8 12ZM12 16L8 20H16L12 16Z"/>
                </svg>
                <h3>4. 三角形の葉</h3>
            </div>
            <div class="icon-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2V22M4 6H20L12 14L4 6Z"/>
                </svg>
                <h3>5. シンプル葉</h3>
            </div>
        </div>
    </div>
</body>
</html>

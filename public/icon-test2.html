<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アイコンテストページ - 柔らかいデザイン</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        h1, h2 {
            color: #333;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .icon-box {
            text-align: center;
            padding: 2rem;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            background: #fafafa;
            transition: all 0.3s ease;
        }
        .icon-box:hover {
            border-color: #64b5f6;
            background: #f0f7ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(100, 181, 246, 0.2);
        }
        .icon-box svg {
            width: 72px;
            height: 72px;
            margin: 0 auto 1rem;
            stroke: #546e7a;
            stroke-width: 1.5;
        }
        .icon-box:hover svg {
            stroke: #2196f3;
        }
        .icon-box h3 {
            margin: 0.5rem 0;
            color: #666;
            font-size: 1rem;
        }
        .section {
            margin: 3rem 0;
        }
        .note {
            background: #e3f2fd;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>アイコンテストページ - 柔らかいデザイン</h1>
        <p class="note">より柔らかく親しみやすいデザインのアイコン候補です。線の太さを調整し、角を丸めたデザインを採用しています。</p>
        
        <div class="section">
            <h2>昆虫アイコン - 柔らかいデザイン</h2>
            <div class="icon-grid">
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m0-6c-2 0-3.5-1.5-3.5-3.5S10 2 12 2s3.5 1.5 3.5 3.5S14 9 12 9zm0 6c-2 0-3.5 1.5-3.5 3.5S10 22 12 22s3.5-1.5 3.5-3.5S14 15 12 15zm-2-7.5c-.5 0-1-.5-1-1s.5-1 1-1m4 0c.5 0 1 .5 1 1s-.5 1-1 1"/>
                    </svg>
                    <h3>1. シンプルな蝶</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v8m0-8l-3-3m3 3l3-3m-3 11c0 2-1 3-1 3s-1-1-1-3m2 0c0 2 1 3 1 3s1-1 1-3m-5-5h6m-6 0c-2 0-3 1-3 2s1 2 3 2m6-4c2 0 3 1 3 2s-1 2-3 2"/>
                    </svg>
                    <h3>2. 優しいトンボ</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="6" stroke-linecap="round"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V2m0 20v-4M6 12H2m20 0h-4m-2.5-5.5L19 4m-14 0l2.5 2.5M8.5 17.5L5 21m14 0l-2.5-3.5"/>
                    </svg>
                    <h3>3. 太陽のような虫</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4c-2 0-4 2-4 4v4c0 2 2 4 4 4s4-2 4-4V8c0-2-2-4-4-4zm0 12v4m-2-18l-1-1m5 1l1-1m-7 9h-2m10 0h2"/>
                    </svg>
                    <h3>4. かわいい甲虫</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 10c3 0 5-2 5-4s-2-3-4-3c-1 0-2 .5-2 .5S10 3 9 3C7 3 5 4 5 6s2 4 5 4m0 0v4m0 0c3 0 5 2 5 4s-2 3-4 3c-1 0-2-.5-2-.5s-1 .5-2 .5c-2 0-4-1-4-3s2-4 5-4"/>
                    </svg>
                    <h3>5. エレガントな蝶</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v18M8 7c0-2.2 1.8-4 4-4s4 1.8 4 4v10c0 2.2-1.8 4-4 4s-4-1.8-4-4V7zm2-4c0-.5-.5-1-1-1m6 0c-.5 0-1 .5-1 1"/>
                    </svg>
                    <h3>6. ミニマル昆虫</h3>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>食草アイコン - 柔らかいデザイン</h2>
            <div class="icon-grid">
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 2c-4 0-7 3-7 7s3 7 7 7 7-3 7-7-3-7-7-7zm0 0v14m0 6v-6m-4-7c1 1 2.5 1.5 4 1.5m4-1.5c-1 1-2.5 1.5-4 1.5"/>
                    </svg>
                    <h3>1. 丸い葉っぱ</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 2s-5 2-5 8c0 3 2 5 5 5s5-2 5-5c0-6-5-8-5-8zm0 13v7M9 18l3-3m3 3l-3-3"/>
                    </svg>
                    <h3>2. しずく型の葉</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3c0 4 3 6 3 10 0 2-1.5 3-3 3s-3-1-3-3c0-4 3-6 3-10zm0 0c0 4-3 6-3 10m6-10c0 4 3 6 3 10M12 20v2"/>
                    </svg>
                    <h3>3. 三つ葉</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 22V8m0 0c-3 0-6 2-6 5s3 3 6 0m0-5c3 0 6 2 6 5s-3 3-6 0"/>
                    </svg>
                    <h3>4. シンプルな芽</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 2C8 2 5 5 5 9c0 3 2 5 4 6v7h6v-7c2-1 4-3 4-6 0-4-3-7-7-7zm0 4v10"/>
                    </svg>
                    <h3>5. 木のシルエット</h3>
                </div>
                
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 20c0-8 6-10 6-10s-2 6-6 10m0 0c0-8-6-10-6-10s2 6 6 10m0 0v2"/>
                    </svg>
                    <h3>6. 羽のような葉</h3>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>組み合わせ例</h2>
            <div class="icon-grid">
                <div class="icon-box">
                    <div style="display: flex; justify-content: center; gap: 1rem;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 48px; height: 48px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 10c3 0 5-2 5-4s-2-3-4-3c-1 0-2 .5-2 .5S10 3 9 3C7 3 5 4 5 6s2 4 5 4m0 0v4m0 0c3 0 5 2 5 4s-2 3-4 3c-1 0-2-.5-2-.5s-1 .5-2 .5c-2 0-4-1-4-3s2-4 5-4"/>
                        </svg>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 48px; height: 48px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2s-5 2-5 8c0 3 2 5 5 5s5-2 5-5c0-6-5-8-5-8zm0 13v7M9 18l3-3m3 3l-3-3"/>
                        </svg>
                    </div>
                    <h3>エレガントな組み合わせ</h3>
                </div>
                
                <div class="icon-box">
                    <div style="display: flex; justify-content: center; gap: 1rem;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 48px; height: 48px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m0-6c-2 0-3.5-1.5-3.5-3.5S10 2 12 2s3.5 1.5 3.5 3.5S14 9 12 9zm0 6c-2 0-3.5 1.5-3.5 3.5S10 22 12 22s3.5-1.5 3.5-3.5S14 15 12 15zm-2-7.5c-.5 0-1-.5-1-1s.5-1 1-1m4 0c.5 0 1 .5 1 1s-.5 1-1 1"/>
                        </svg>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 48px; height: 48px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2c-4 0-7 3-7 7s3 7 7 7 7-3 7-7-3-7-7-7zm0 0v14m0 6v-6m-4-7c1 1 2.5 1.5 4 1.5m4-1.5c-1 1-2.5 1.5-4 1.5"/>
                        </svg>
                    </div>
                    <h3>シンプルな組み合わせ</h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アイコンテストページ - リアルなデザイン</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        h1, h2 {
            color: #333;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .icon-box {
            text-align: center;
            padding: 2rem;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            background: #fafafa;
            transition: all 0.3s ease;
        }
        .icon-box:hover {
            border-color: #81c784;
            background: #f1f8e9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(129, 199, 132, 0.2);
        }
        .icon-box svg {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
        }
        .icon-box h3 {
            margin: 0.5rem 0;
            color: #666;
            font-size: 1rem;
        }
        .section {
            margin: 3rem 0;
        }
        .note {
            background: #e8f5e9;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>アイコンテストページ - リアルなデザイン</h1>
        <p class="note">実物の昆虫や植物により近い、詳細で自然なデザインのアイコンです。</p>
        
        <div class="section">
            <h2>昆虫アイコン - リアルなデザイン</h2>
            <div class="icon-grid">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- アゲハチョウ風 -->
                        <path d="M12 12c0 0-4-1-6-4s-1-5 1-5c2 0 3 2 5 2m0 7c0 0 4-1 6-4s1-5-1-5c-2 0-3 2-5 2m0 7v-7m0 7c0 0-3 1-5 4s-1 4 0 4 3-2 5-2m0-6c0 0 3 1 5 4s1 4 0 4-3-2-5-2"/>
                        <circle cx="11" cy="5" r="0.5" fill="#4a5568"/>
                        <circle cx="13" cy="5" r="0.5" fill="#4a5568"/>
                        <path stroke-linecap="round" d="M11 5c-0.5-1-1-1.5-1-1.5M13 5c0.5-1 1-1.5 1-1.5"/>
                    </svg>
                    <h3>1. アゲハチョウ</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- カブトムシ風 -->
                        <ellipse cx="12" cy="14" rx="5" ry="7" fill="none"/>
                        <ellipse cx="12" cy="9" rx="3" ry="4" fill="none"/>
                        <path d="M12 5c0-1 0-2-1-3m0 0c-1 0-2 1-2 2m3-2c1 0 2 1 2 2M12 5c0-1 0-2 1-3"/>
                        <path d="M9 14c-1 0-2 1-2 2m10-2c1 0 2 1 2 2M9 11c-1 0-2 1-2 2m10-2c1 0 2 1 2 2M9 17c-1 0-2 1-2 2m10-2c1 0 2 1 2 2"/>
                    </svg>
                    <h3>2. カブトムシ</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- トンボ風 -->
                        <ellipse cx="12" cy="8" rx="1.5" ry="3" fill="none"/>
                        <path d="M12 11v8"/>
                        <ellipse cx="12" cy="14" rx="0.8" ry="2" fill="none"/>
                        <ellipse cx="12" cy="17" rx="0.6" ry="1.5" fill="none"/>
                        <!-- 羽 -->
                        <ellipse cx="7" cy="9" rx="4" ry="1.5" fill="none" transform="rotate(-15 7 9)"/>
                        <ellipse cx="17" cy="9" rx="4" ry="1.5" fill="none" transform="rotate(15 17 9)"/>
                        <ellipse cx="7" cy="11" rx="4" ry="1.5" fill="none" transform="rotate(-15 7 11)"/>
                        <ellipse cx="17" cy="11" rx="4" ry="1.5" fill="none" transform="rotate(15 17 11)"/>
                        <!-- 複眼 -->
                        <circle cx="10.5" cy="6" r="1" fill="none"/>
                        <circle cx="13.5" cy="6" r="1" fill="none"/>
                    </svg>
                    <h3>3. トンボ</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- テントウムシ風 -->
                        <ellipse cx="12" cy="12" rx="6" ry="7" fill="none"/>
                        <path d="M12 5v14"/>
                        <circle cx="9" cy="9" r="1" fill="#4a5568"/>
                        <circle cx="15" cy="9" r="1" fill="#4a5568"/>
                        <circle cx="8" cy="13" r="1" fill="#4a5568"/>
                        <circle cx="16" cy="13" r="1" fill="#4a5568"/>
                        <circle cx="10" cy="16" r="1" fill="#4a5568"/>
                        <circle cx="14" cy="16" r="1" fill="#4a5568"/>
                        <path d="M10 5c-0.5-1-1-2-1-2M14 5c0.5-1 1-2 1-2" stroke-linecap="round"/>
                    </svg>
                    <h3>4. テントウムシ</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- バッタ風 -->
                        <ellipse cx="10" cy="12" rx="6" ry="2" fill="none" transform="rotate(-10 10 12)"/>
                        <ellipse cx="8" cy="11" rx="2" ry="1.5" fill="none"/>
                        <path d="M14 12c2 0 4-2 5-4m-5 4c2 0 4 2 5 4"/>
                        <path d="M8 13c0 2-1 4-2 5m0 0c-1 0-2 0-2-1m2 1c0 1 1 1 2 0"/>
                        <path d="M10 13c0 2 0 4-1 5m0 0c-1 0-2 0-2-1m2 1c0 1 1 1 2 0"/>
                        <path d="M12 13c0 2 1 4 1 5m0 0c-1 0-2 0-2-1m2 1c0 1 1 1 2 0"/>
                        <circle cx="7" cy="10" r="0.5" fill="#4a5568"/>
                        <path d="M6 10c-0.5-0.5-1-1-1-1" stroke-linecap="round"/>
                    </svg>
                    <h3>5. バッタ</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- ミツバチ風 -->
                        <ellipse cx="12" cy="12" rx="4" ry="6" fill="none"/>
                        <path d="M8 10h8M8 12h8M8 14h8" stroke-width="1"/>
                        <ellipse cx="8" cy="11" rx="3" ry="2" fill="none" opacity="0.5"/>
                        <ellipse cx="16" cy="11" rx="3" ry="2" fill="none" opacity="0.5"/>
                        <circle cx="11" cy="8" r="0.5" fill="#4a5568"/>
                        <circle cx="13" cy="8" r="0.5" fill="#4a5568"/>
                        <path d="M11 8c-0.5-1-1-1-1-1M13 8c0.5-1 1-1 1-1" stroke-linecap="round"/>
                        <path d="M12 18c0 1-1 2-1 2m1-2c0 1 1 2 1 2" stroke-linecap="round"/>
                    </svg>
                    <h3>6. ミツバチ</h3>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>食草アイコン - リアルなデザイン</h2>
            <div class="icon-grid">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- イチョウの葉 -->
                        <path d="M12 20c-4-1-7-4-7-8 0-3 2-5 5-6 0-2 0-3 2-3s2 1 2 3c3 1 5 3 5 6 0 4-3 7-7 8z"/>
                        <path d="M12 3v17M9 8c1 0.5 2 0.5 3 0.5s2 0 3-0.5M9 12c1 0.5 2 0.5 3 0.5s2 0 3-0.5"/>
                    </svg>
                    <h3>1. イチョウの葉</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- カエデの葉 -->
                        <path d="M12 2l-2 4-4-1 1 4-4 2 4 2-1 4 4-1 2 4 2-4 4 1-1-4 4-2-4-2 1-4-4 1z"/>
                        <path d="M12 2v18M8 8l4 4 4-4M8 12h8"/>
                    </svg>
                    <h3>2. カエデの葉</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- サクラの葉 -->
                        <path d="M12 3c-4 0-7 4-7 8 0 2 0.5 3.5 1.5 4.5S9 17 12 20c3-3 4.5-3.5 5.5-4.5S19 13 19 11c0-4-3-8-7-8z"/>
                        <path d="M12 3v17M9 8l3 2 3-2M9 12l3 2 3-2M9 16l3 1 3-1"/>
                        <path d="M7 11c-0.5 0-1 0-1 0M17 11c0.5 0 1 0 1 0" stroke-linecap="round"/>
                    </svg>
                    <h3>3. サクラの葉</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- シダの葉 -->
                        <path d="M12 2v20"/>
                        <path d="M8 4c-2 0-3 1-3 1s1 1 3 1m8-2c2 0 3 1 3 1s-1 1-3 1"/>
                        <path d="M8 7c-2 0-3 1-3 1s1 1 3 1m8-2c2 0 3 1 3 1s-1 1-3 1"/>
                        <path d="M8 10c-2 0-3 1-3 1s1 1 3 1m8-2c2 0 3 1 3 1s-1 1-3 1"/>
                        <path d="M8 13c-2 0-3 1-3 1s1 1 3 1m8-2c2 0 3 1 3 1s-1 1-3 1"/>
                        <path d="M8 16c-2 0-3 1-3 1s1 1 3 1m8-2c2 0 3 1 3 1s-1 1-3 1"/>
                        <path d="M8 19c-2 0-3 1-3 1s1 1 3 1m8-2c2 0 3 1 3 1s-1 1-3 1"/>
                    </svg>
                    <h3>4. シダの葉</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- タケの葉 -->
                        <path d="M12 2c-1 0-2 1-2 3v4c0 1-1 2-2 2s-2-1-2-2c0 4 2 6 4 7v6h4v-6c2-1 4-3 4-7 0 1-1 2-2 2s-2-1-2-2V5c0-2-1-3-2-3z"/>
                        <path d="M12 8v14M10 12h4M10 16h4M10 20h4"/>
                    </svg>
                    <h3>5. タケの葉</h3>
                </div>
                
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2">
                        <!-- クローバー -->
                        <circle cx="10" cy="8" r="3" fill="none"/>
                        <circle cx="14" cy="8" r="3" fill="none"/>
                        <circle cx="12" cy="11" r="3" fill="none"/>
                        <path d="M12 14v8" stroke-linecap="round"/>
                        <path d="M10 20c-1 0-2 0-2 0m4 0h2"/>
                    </svg>
                    <h3>6. クローバー</h3>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>おすすめの組み合わせ</h2>
            <div class="icon-grid">
                <div class="icon-box">
                    <div style="display: flex; justify-content: center; gap: 2rem; align-items: center;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2" style="width: 60px; height: 60px;">
                            <path d="M12 12c0 0-4-1-6-4s-1-5 1-5c2 0 3 2 5 2m0 7c0 0 4-1 6-4s1-5-1-5c-2 0-3 2-5 2m0 7v-7m0 7c0 0-3 1-5 4s-1 4 0 4 3-2 5-2m0-6c0 0 3 1 5 4s1 4 0 4-3-2-5-2"/>
                            <circle cx="11" cy="5" r="0.5" fill="#4a5568"/>
                            <circle cx="13" cy="5" r="0.5" fill="#4a5568"/>
                            <path stroke-linecap="round" d="M11 5c-0.5-1-1-1.5-1-1.5M13 5c0.5-1 1-1.5 1-1.5"/>
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2" style="width: 60px; height: 60px;">
                            <path d="M12 3c-4 0-7 4-7 8 0 2 0.5 3.5 1.5 4.5S9 17 12 20c3-3 4.5-3.5 5.5-4.5S19 13 19 11c0-4-3-8-7-8z"/>
                            <path d="M12 3v17M9 8l3 2 3-2M9 12l3 2 3-2M9 16l3 1 3-1"/>
                            <path d="M7 11c-0.5 0-1 0-1 0M17 11c0.5 0 1 0 1 0" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h3>アゲハチョウ × サクラ</h3>
                </div>
                
                <div class="icon-box">
                    <div style="display: flex; justify-content: center; gap: 2rem; align-items: center;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2" style="width: 60px; height: 60px;">
                            <ellipse cx="12" cy="14" rx="5" ry="7" fill="none"/>
                            <ellipse cx="12" cy="9" rx="3" ry="4" fill="none"/>
                            <path d="M12 5c0-1 0-2-1-3m0 0c-1 0-2 1-2 2m3-2c1 0 2 1 2 2M12 5c0-1 0-2 1-3"/>
                            <path d="M9 14c-1 0-2 1-2 2m10-2c1 0 2 1 2 2M9 11c-1 0-2 1-2 2m10-2c1 0 2 1 2 2M9 17c-1 0-2 1-2 2m10-2c1 0 2 1 2 2"/>
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.2" style="width: 60px; height: 60px;">
                            <path d="M12 2l-2 4-4-1 1 4-4 2 4 2-1 4 4-1 2 4 2-4 4 1-1-4 4-2-4-2 1-4-4 1z"/>
                            <path d="M12 2v18M8 8l4 4 4-4M8 12h8"/>
                        </svg>
                    </div>
                    <h3>カブトムシ × カエデ</h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハムシデータ確認</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .hamushi-item {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .hamushi-name {
            font-weight: bold;
            color: #2c3e50;
        }
        .hamushi-detail {
            color: #555;
            margin-left: 20px;
        }
        h1 {
            color: #34495e;
        }
        .status {
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>ハムシデータ統合確認</h1>
    <div class="status" id="status">データを読み込み中...</div>
    <div id="hamushi-list"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        // CSVファイルを読み込み
        Papa.parse('/hamushi_integrated_master.csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const statusDiv = document.getElementById('status');
                const listDiv = document.getElementById('hamushi-list');
                
                if (results.data && results.data.length > 0) {
                    statusDiv.innerHTML = `
                        <strong>✅ データ読み込み成功</strong><br>
                        総レコード数: ${results.data.length}件<br>
                        新規追加列: 幼虫期、幼虫期に関する備考
                    `;
                    
                    // 最初の5件を表示
                    listDiv.innerHTML = '<h2>サンプルデータ（最初の5件）</h2>';
                    results.data.slice(0, 5).forEach((row, index) => {
                        const item = document.createElement('div');
                        item.className = 'hamushi-item';
                        item.innerHTML = `
                            <div class="hamushi-name">${index + 1}. ${row['和名'] || '名前なし'} (${row['学名'] || ''})</div>
                            <div class="hamushi-detail">亜科: ${row['亜科和名'] || ''}</div>
                            <div class="hamushi-detail">食草: ${row['食草'] || 'データなし'}</div>
                            <div class="hamushi-detail">成虫出現時期: ${row['成虫出現時期'] || 'データなし'}</div>
                            <div class="hamushi-detail">幼虫期: ${row['幼虫期'] || 'データなし'}</div>
                            <div class="hamushi-detail">幼虫期備考: ${row['幼虫期に関する備考'] || 'データなし'}</div>
                        `;
                        listDiv.appendChild(item);
                    });
                } else {
                    statusDiv.innerHTML = '❌ データが見つかりませんでした';
                }
            },
            error: function(error) {
                document.getElementById('status').innerHTML = `❌ エラー: ${error}`;
            }
        });
    </script>
</body>
</html>
